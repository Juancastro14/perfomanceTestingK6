name: Run k6 load test

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite (script bajo scripts/)'
        type: choice
        options:
          - load-test
        default: load-test
      parallelism:
        description: 'Numero de pods runner (los VU del script se dividen entre ellos)'
        type: number
        default: 4
      target_url:
        description: 'URL bajo prueba'
        type: string
        default: 'https://test.k6.io'
      test_name_prefix:
        description: 'Prefijo del TestRun (se le agrega run_number para evitar colisiones)'
        type: string
        default: 'qa-load'
      namespace:
        description: 'Namespace destino'
        type: choice
        options:
          - compute-resources-area-calidad-dev
        default: compute-resources-area-calidad-dev

permissions:
  contents: read

jobs:
  run-k6:
    # Self-hosted porque el cluster (kind) corre en la maquina del platform team
    # y solo es accesible via 127.0.0.1. Cuando migremos a AKS publico,
    # cambiar a 'ubuntu-latest' (y reescribir los steps en bash).
    runs-on: self-hosted
    timeout-minutes: 30
    # PowerShell nativo de Windows para evitar el infierno de bash + paths
    # Windows en self-hosted runners.
    defaults:
      run:
        shell: powershell
    env:
      NAMESPACE: ${{ inputs.namespace }}
      TEST_NAME: ${{ inputs.test_name_prefix }}-${{ github.run_number }}
      SUITE: ${{ inputs.suite }}
      PARALLELISM: ${{ inputs.parallelism }}
      TARGET_URL: ${{ inputs.target_url }}
      RUNNER_IMAGE: ghcr.io/juancastro14/k6-influxdb:latest
      KUBECONFIG: ${{ github.workspace }}\.kubeconfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Write kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          if ([string]::IsNullOrEmpty($env:KUBECONFIG_DATA)) {
            Write-Error "KUBECONFIG_DATA secret is not set. Configurar en Settings > Secrets and variables > Actions."
            exit 1
          }
          $bytes = [System.Convert]::FromBase64String($env:KUBECONFIG_DATA)
          [System.IO.File]::WriteAllBytes($env:KUBECONFIG, $bytes)

      - name: Verify cluster access
        run: |
          kubectl auth can-i create testruns.k6.io -n $env:NAMESPACE
          if ($LASTEXITCODE -ne 0) { exit 1 }
          kubectl -n $env:NAMESPACE get crd testruns.k6.io | Out-Null
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Resolve script path
        id: script
        run: |
          $scriptPath = "scripts/$($env:SUITE).js"
          if (-not (Test-Path $scriptPath)) {
            Write-Error "Script no encontrado: $scriptPath"
            exit 1
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "script_path=$scriptPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "script_file=$($env:SUITE).js"

      - name: Create script ConfigMap
        run: |
          $cmYaml = kubectl create configmap "k6-script-$($env:TEST_NAME)" `
            --from-file="${{ steps.script.outputs.script_path }}" `
            -n $env:NAMESPACE `
            --dry-run=client -o yaml
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $cmYaml | kubectl apply -f -
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Render and apply TestRun
        env:
          SCRIPT_FILE: ${{ steps.script.outputs.script_file }}
        run: |
          $template = Get-Content -Path 'manifests/testrun.template.yaml' -Raw
          $rendered = $template `
            -replace '\$\{TEST_NAME\}',   $env:TEST_NAME `
            -replace '\$\{NAMESPACE\}',   $env:NAMESPACE `
            -replace '\$\{PARALLELISM\}', $env:PARALLELISM `
            -replace '\$\{TARGET_URL\}',  $env:TARGET_URL `
            -replace '\$\{SCRIPT_FILE\}', $env:SCRIPT_FILE `
            -replace '\$\{RUNNER_IMAGE\}',$env:RUNNER_IMAGE
          $tempPath = Join-Path $env:RUNNER_TEMP 'testrun.yaml'
          Set-Content -Path $tempPath -Value $rendered -Encoding utf8
          Write-Host "::group::Rendered TestRun"
          Get-Content $tempPath
          Write-Host "::endgroup::"
          kubectl apply -f $tempPath
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Wait for runners to start
        run: |
          for ($i = 1; $i -le 60; $i++) {
            $stage = kubectl -n $env:NAMESPACE get testrun $env:TEST_NAME -o jsonpath='{.status.stage}' 2>$null
            if (-not $stage) { $stage = "pending" }
            Write-Host "stage=$stage"
            if ($stage -eq "started") {
              Write-Host "Runners arrancaron."
              break
            }
            Start-Sleep -Seconds 5
          }

      - name: Stream runner logs
        run: |
          kubectl -n $env:NAMESPACE logs -l "k6_cr=$($env:TEST_NAME)" -f --tail=200 --max-log-requests=20
          # Ignorar el exit code: cuando los pods terminan kubectl logs sale con error.
          exit 0

      - name: Final status
        if: always()
        run: |
          $stage = kubectl -n $env:NAMESPACE get testrun $env:TEST_NAME -o jsonpath='{.status.stage}' 2>$null
          if (-not $stage) { $stage = "unknown" }
          $summary = @"
          ## Resultado del TestRun ``$($env:TEST_NAME)``
          - **Stage final:** ``$stage``
          - **Parallelism:** $($env:PARALLELISM)
          - **Target:** $($env:TARGET_URL)
          - **Suite:** $($env:SUITE)
          - **Metricas:** revisar el dashboard k6 en Grafana, filtrar por ``testid=$($env:TEST_NAME)``
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
          kubectl -n $env:NAMESPACE describe testrun $env:TEST_NAME

      - name: Cleanup
        if: always()
        run: |
          kubectl -n $env:NAMESPACE delete testrun $env:TEST_NAME --ignore-not-found
          kubectl -n $env:NAMESPACE delete configmap "k6-script-$($env:TEST_NAME)" --ignore-not-found
